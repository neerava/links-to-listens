<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Links to Listens{% endblock %}</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface-hover: #1a1a2e;
      --border: #2a2a3d;
      --text: #e8e8f0;
      --text-secondary: #8888a0;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --radius: 16px;
      --nav-height: 52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shared top bar (consistent across all 4 UIs) ───────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      min-height: var(--nav-height);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 0.5rem;
      flex-wrap: wrap;
      position: relative;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .nav-brand svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }

    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
    }

    .nav-toggle span {
      display: block;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
      transition: transform 0.2s, opacity 0.2s;
    }

    .nav-links {
      display: flex;
      gap: 0.2rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-link {
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover { color: var(--text); background: var(--surface-hover); }

    .nav-link.active {
      color: var(--accent-light);
      background: var(--accent-glow);
    }

    @media (max-width: 768px) {
      .nav-toggle { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-height);
        left: 0;
        right: 0;
        flex-direction: column;
        align-items: stretch;
        padding: 0.5rem;
        gap: 0.25rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .nav.nav-open .nav-links { display: flex; }
      .nav-link { padding: 0.65rem 1rem; border-radius: 8px; }
    }

    /* ── Main content area ─────────────────────────────────────────────── */
    .page-main { padding-bottom: 2rem; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  {% set nav_current = self.nav_active() %}
  {% include 'partials/nav.html' %}

  <main class="page-main">
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
